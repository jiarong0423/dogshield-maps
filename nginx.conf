server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # CORS：Godot HTTPRequest 不受 CORS 影響，但瀏覽器端點開 JSON 會需要
    add_header 'Access-Control-Allow-Origin' '*' always;
    add_header 'Cache-Control' 'public, max-age=300' always;

    # JSON 正確 mime
    types {
        application/json json;
        image/png        png;
        text/html        html;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    # PNG 長快取（版本號在 JSON 裡，PNG 本身不常變）
    location ~* \.png$ {
        expires 1d;
        add_header 'Access-Control-Allow-Origin' '*' always;
    }
}
